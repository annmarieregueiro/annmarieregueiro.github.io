<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monster Generator</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#111;--muted:#666;--line:#ddd;--btn:#111;--btn-text:#fff}
*{box-sizing:border-box}
body{margin:0;padding:20px;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:980px;margin:0 auto}
.card{background:var(--card);border-radius:20px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:16px}
h1{margin:0 0 10px;font-size:30px;line-height:1.1}
p{margin:0 0 14px;color:var(--muted)}
.row{display:flex;gap:10px;flex-wrap:wrap}
button{appearance:none;border:none;border-radius:14px;padding:15px 18px;font-size:18px;font-weight:700;background:var(--btn);color:var(--btn-text);cursor:pointer}
button.secondary{background:#e7e7ea;color:#111}
pre{margin:0;white-space:pre-wrap;word-wrap:break-word;background:#fafafa;border:1px solid var(--line);border-radius:16px;padding:14px;font-size:15px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Monster Generator</h1>
    <p>Clean stat logic version.</p>
    <div class="row">
      <button onclick="generate()">Generate Monster</button>
      <button class="secondary" onclick="copySummary()">Copy Summary</button>
    </div>
  </div>
  <div class="card"><pre id="output">Tap Generate Monster.</pre></div>
</div>

<script>
function wPick(list){const total=list.reduce((s,i)=>s+i[1],0);let r=Math.random()*total;for(const [v,w] of list){r-=w;if(r<=0)return v;}return list[list.length-1][0];}
function sampleDistinct(arr,count){const pool=[...arr],out=[];for(let i=0;i<count&&pool.length;i++){const idx=Math.floor(Math.random()*pool.length);out.push(pool.splice(idx,1)[0]);}return out;}
function reroll(generatorFn,validFn,max=800){for(let i=0;i<max;i++){const value=generatorFn();if(validFn(value)) return value;}throw new Error("Could not find valid result after rerolls.");}
function clampStat(v){return Math.max(1,Math.min(5,v));}
function hashString(str){let hash=2166136261;for(let i=0;i<str.length;i++){hash^=str.charCodeAt(i);hash+=(hash<<1)+(hash<<4)+(hash<<7)+(hash<<8)+(hash<<24);}return (hash>>>0).toString(36).toUpperCase();}
function stableID(mon){const core=[mon.palette,mon.bodyVariant,mon.bodyEdge,mon.facePlacement,mon.eyes,mon.eyeTone,mon.brows,mon.elevenLines,mon.nose,mon.mouth,mon.teeth,mon.teethModifier,mon.tongue,mon.cheeks,mon.horns,mon.tailDisplay,mon.headAccessory,mon.headMetal,mon.faceAccessory,mon.goldMonocle,mon.twinsFlag,mon.tripletsFlag].join("|");return "MON-"+hashString(core).slice(0,8);}
function familyID(base,type){const core=[type,base.palette,base.bodyVariant,base.bodyEdge,base.facePlacement].join("|");return (type==="triplets"?"TRIP-":"TWIN-")+hashString(core).slice(0,8);}
const BREEDS={"Sunset":"Emberling","Slime":"Oozeling","Dream":"Dreamling","Electric":"Voltling","Candy":"Cinnaling","Ocean":"Tidaling","Sorbet":"Zestling","Bruise":"Duskling","Mint":"Mintling","Fireball":"Cinderling","Cotton Candy":"Cloudling","Toxic":"Toxling","Berry":"Plumling","Sky":"Etherling","Garden":"Mossling","Highlighter":"Lumenling","Frost":"Frostling","Lava":"Moltenling","Pastel":"Softling","Retro":"Poppling","Vintage":"Sepling","Goth":"Nightling"};
function teethModifierFor(teeth){if(teeth==="No teeth")return "None";if(teeth==="Underbite"||teeth==="Overbite")return wPick([["None",60],["Silver teeth",1.5],["Gold teeth",0.7],["Rainbow teeth",0.35]]);return wPick([["None",60],["Silver teeth",1.5],["Gold teeth",0.7]]);}
function validTonguesForTeeth(teeth){const options=["Round tongue going down the centre","Round tongue going down the side","Round tongue licking up","Forked tongue center","Forked tongue going down the side"];return options.filter(t=>{if(t==="Round tongue going down the centre")return !["Underbite","Overbite","Buck teeth"].includes(teeth);if(t==="Round tongue going down the side")return !["Underbite","Overbite","Fangs going down","Fangs going up","Buck teeth"].includes(teeth);if(t==="Round tongue licking up")return !["Underbite","Overbite","Fangs going down","Fangs going up","A single tooth going up","Buck teeth"].includes(teeth);if(t==="Forked tongue center")return !["Underbite","Overbite","Buck teeth"].includes(teeth);if(t==="Forked tongue going down the side")return !["Underbite","Overbite","Fangs going down","Fangs going up","Buck teeth"].includes(teeth);return true;});}
function tongueForTeeth(teeth){const valid=validTonguesForTeeth(teeth);if(!valid.length)return "No tongue";return wPick(valid.map(t=>{if(t==="Round tongue going down the centre")return [t,15];if(t==="Round tongue going down the side")return [t,15];if(t==="Round tongue licking up")return [t,8];if(t==="Forked tongue center")return [t,4];return [t,2];}));}
function headOptionsForHorns(h){const opts=[];const add=(n,w)=>opts.push([n,w]);add("None",20);if(!["Curled in","Curled out","Antlers"].includes(h)){add("Antenna headband",10);add("Star headband",10);add("Party hat",10);add("Tiny hat",10);add("Hair bow",10);add("Witch hat",6);}if(h==="No horns"){add("Cat ears",6);add("Bunny ears",5);add("Beret",6);}if(h==="Small nubs")add("Bunny ears",5);add("Crown",3);add("Arrow through head",2);add("Halo",3);return opts;}
function headMetalForAccessory(headAccessory){if(headAccessory==="Crown")return wPick([["None",40],["Gold",1]]);if(headAccessory==="Halo")return wPick([["None",40],["Gold",1]]);if(headAccessory==="Star headband")return wPick([["None",40],["Silver",1.6],["Gold",0.8]]);if(headAccessory==="Antenna headband")return wPick([["None",40],["Silver",1.6],["Gold",0.8]]);if(headAccessory==="Arrow through head")return wPick([["None",40],["Silver",1.6],["Gold",0.8]]);return "None";}
function faceAccessoryOptions(ctx){const opts=[];const add=(n,w)=>opts.push([n,w]);add("None",20);add("Bandage",10);add("Stitches",10);if(ctx.tongue==="No tongue"&&ctx.mouth!=="Surprised")add("Drool",10);add("Eyelashes",7);add("Round glasses",7);add("Wayfarer glasses",7);add("Wayfarer sunglasses",4);if(ctx.facePlacement==="Low")add("Sweat drop",4);add("Heart sunglasses",2);add("Eyepatch",2);add("Monocle",2);if(ctx.facePlacement==="High"){add("Circle hole in body",2);add("Heart hole in body",1);add("Star hole in body",0.5);}add("Moustache",1.2);add("Moustache + Monocle",0.25);return opts;}
function isSmileMouth(m){return m==="Smile no lips"||m==="Smile lips";}
function isAngryBrow(b){return b==="Angry fluffy brow"||b==="Angry straight brow";}
function isWorriedBrow(b){return b==="Worried fluffy brow"||b==="Worried straight brow";}
function isUnibrow(b){return b==="Fluffy unibrow"||b==="Straight unibrow";}
function computeMischief(mon){const base={"Sad":1,"Bored":1,"Normal":2,"Dots":2,"1 eye (cyclops)":2,"Shifty":4,"Angry":4,"3 Eyes":5};let s=base[mon.eyes]??2;const mods={"No tail or wings":0,"Round tail":0,"Fluffy tail":-1,"Curled tail":1,"Arrow tail":1,"Angel wings":-1,"Bat wings":1,"Demon wings":1};if(mon.tailMode==="Tail only")s+=mods[mon.tail]||0;if(mon.tailMode==="Wings only")s+=mods[mon.wings]||0;if(mon.tailMode==="Both"){s+=mods[mon.tail]||0;s+=mods[mon.wings]||0;}if(mon.tongue!=="No tongue")s+=1;if(isAngryBrow(mon.brows))s+=1;if(isUnibrow(mon.brows))s+=1;if(mon.brows==="Just a brow ridge / fold")s+=1;if(mon.horns==="Curled in")s+=1;if(["Bandage","Stitches","Eyepatch","Sweat drop","Circle hole in body","Heart hole in body","Star hole in body"].includes(mon.faceAccessory))s+=1;if(mon.cheeks==="Eye bags"||mon.cheeks==="Freckles")s+=1;if(mon.mouth==="Surprised")s+=1;if(mon.eyes==="Sad")s-=1;if(isWorriedBrow(mon.brows))s-=1;if(mon.teeth==="Buck teeth")s-=1;if(mon.faceAccessory==="Round glasses")s-=1;if(isSmileMouth(mon.mouth)&&(mon.eyes==="Angry"||isAngryBrow(mon.brows)))s+=1;return clampStat(s);}
function computeBiteRisk(mon){const base={"No teeth":1,"Buck teeth":1,"A single tooth going up":1,"A single tooth going down":1,"Underbite":2,"Fangs going up":2,"Overbite":3,"Fangs going down":4};let s=base[mon.teeth]??2;if(mon.tongue.startsWith("Round tongue"))s-=1;if(mon.tongue.startsWith("Forked tongue"))s+=1;if(mon.eyes==="Angry")s+=1;if(mon.eyes==="Sad")s-=1;if(isAngryBrow(mon.brows))s+=1;if(isWorriedBrow(mon.brows))s-=1;if(isUnibrow(mon.brows)||mon.brows==="Just a brow ridge / fold")s+=1;if(mon.horns==="Straight and pointy"||mon.horns==="Curled in")s+=1;if(mon.horns==="Antlers")s-=1;if(mon.tail==="Arrow tail")s+=1;if(mon.wings==="Bat wings"||mon.wings==="Demon wings")s+=1;if(mon.wings==="Angel wings")s-=1;if(mon.headAccessory==="Halo"||mon.headAccessory==="Bunny ears"||mon.headAccessory==="Hair bow")s-=1;if(mon.faceAccessory==="Stitches"||mon.faceAccessory==="Eyepatch")s+=1;if(mon.faceAccessory==="Round glasses"||mon.faceAccessory==="Eyelashes")s-=1;if(mon.cheeks==="Puffy cheeks")s-=1;if(mon.teeth==="Fangs going down"&&mon.tongue.startsWith("Forked tongue"))s+=1;if(mon.eyes==="Angry"&&isAngryBrow(mon.brows))s+=1;return clampStat(s);}
function computeAttention(mon){const base={"Dots":1,"Bored":1,"Sad":1,"Shifty":2,"Normal":3,"1 eye (cyclops)":3,"Angry":4,"3 Eyes":5};let s=base[mon.eyes]??3;if(isAngryBrow(mon.brows))s+=1;if(isWorriedBrow(mon.brows))s-=1;if(isUnibrow(mon.brows)||mon.brows==="Just a brow ridge / fold")s+=1;if(mon.bodyEdge==="Zig zag edges")s-=1;if(mon.bodyEdge==="Wavy edges")s+=1;if(mon.mouth==="Surprised")s-=1;if(["Round tongue going down the centre","Round tongue going down the side","Round tongue licking up"].includes(mon.tongue))s-=1;if(mon.teeth==="Buck teeth")s+=1;if(mon.teeth==="A single tooth going up"||mon.teeth==="A single tooth going down")s-=1;if(mon.faceAccessory==="Round glasses"||mon.faceAccessory==="Monocle"||mon.faceAccessory==="Moustache + Monocle")s+=1;if(mon.faceAccessory==="Drool"||mon.faceAccessory==="Sweat drop")s-=1;if(mon.headAccessory==="Antenna headband"||mon.headAccessory==="Star headband"||mon.headAccessory==="Arrow through head")s-=1;if((mon.mouth==="Normal lips"||mon.mouth==="Normal no lips")&&isAngryBrow(mon.brows)&&mon.tongue==="Round tongue licking up")s+=1;return clampStat(s);}
function computeCharisma(mon){const base={"Smile lips":5,"Smile no lips":4,"Surprised":4,"Normal lips":3,"Normal no lips":2,"Frown lips":2,"Frown no lips":1};let s=base[mon.mouth]??3;if(mon.faceAccessory==="Monocle")s+=1;if(mon.faceAccessory==="Moustache")s+=1;if(mon.faceAccessory==="Moustache + Monocle")s+=2;if(["Wayfarer sunglasses","Heart sunglasses","Eyelashes","Eyepatch"].includes(mon.faceAccessory))s+=1;if(["Round glasses","Drool"].includes(mon.faceAccessory))s-=1;if(mon.cheeks==="Puffy cheeks"||mon.cheeks==="Freckles")s+=1;if(mon.cheeks==="Eye bags")s-=1;if(mon.eyes==="3 Eyes"||mon.eyes==="1 eye (cyclops)")s+=1;if(["Angry","Sad","Bored","Dots"].includes(mon.eyes))s-=1;if(mon.teethModifier==="Rainbow teeth")s+=1;if(mon.teeth==="Buck teeth")s-=1;if(mon.tail==="Curled tail")s+=1;if(mon.horns==="Small nubs")s+=1;if(["Antenna headband","Star headband","Party hat","Hair bow","Bunny ears"].includes(mon.headAccessory))s+=1;if(["Gold","Silver"].includes(mon.headMetal)||["Gold teeth","Silver teeth"].includes(mon.teethModifier))s+=1;if(mon.mouth==="Smile no lips"&&(mon.eyes==="Shifty"||mon.eyes==="Bored"))s+=1;if(isSmileMouth(mon.mouth)&&mon.faceAccessory==="Eyelashes")s+=1;if(isSmileMouth(mon.mouth)&&["Wayfarer sunglasses","Heart sunglasses"].includes(mon.faceAccessory))s+=1;if(isSmileMouth(mon.mouth)&&mon.cheeks==="Puffy cheeks")s+=1;if((mon.mouth==="Frown lips"||mon.mouth==="Frown no lips")&&mon.faceAccessory==="Drool")s-=1;return clampStat(s);}
function computePersonalSpace(mon){const base={"Antlers":5,"Curled in":4,"Curled out":4,"Straight and pointy":3,"Small nubs":2,"No horns":1};let s=base[mon.horns]??2;if(mon.facePlacement==="Low")s+=1;if(mon.mouth==="Smile lips")s-=2;if(mon.mouth==="Smile no lips")s-=1;if(mon.mouth==="Frown lips"||mon.mouth==="Frown no lips")s+=1;if(["Angry","Sad","Shifty"].includes(mon.eyes))s+=1;if(["Round glasses","Wayfarer glasses","Wayfarer sunglasses","Eyepatch","Stitches","Sweat drop"].includes(mon.faceAccessory))s+=1;if(["Heart sunglasses","Eyelashes","Moustache","Moustache + Monocle"].includes(mon.faceAccessory))s-=1;if(mon.faceAccessory==="Heart hole in body")s-=1;if(["Hair bow","Bunny ears","Party hat","Antenna headband","Star headband","Halo"].includes(mon.headAccessory))s-=1;if(["Crown","Witch hat"].includes(mon.headAccessory))s+=1;if(mon.bodyEdge==="Scalloped edges")s-=1;if(mon.bodyEdge==="Zig zag edges")s+=1;if(mon.bodyEdge==="Wavy edges")s-=1;if(["Fluffy tail","Curled tail","Round tail"].includes(mon.tail))s-=1;if(mon.tail==="Arrow tail")s+=1;if(mon.wings==="Angel wings")s-=1;if(["Bat wings","Demon wings"].includes(mon.wings))s+=1;if(mon.teeth==="Buck teeth")s+=1;const blocked=isAngryBrow(mon.brows)||isWorriedBrow(mon.brows);if(mon.mouth==="Smile no lips"&&!blocked&&(mon.eyes==="Shifty"||mon.eyes==="Bored"))s-=1;if(mon.eyes==="Angry"&&(mon.mouth==="Frown lips"||mon.mouth==="Frown no lips"))s+=1;if(isSmileMouth(mon.mouth)&&mon.faceAccessory==="Eyelashes")s-=1;return clampStat(s);}
function computeHoarding(mon){const base={"Crown":5,"Witch hat":4,"Antenna headband":4,"Star headband":4,"Party hat":3,"Tiny hat":3,"Beret":2,"Halo":2,"Hair bow":2,"Bunny ears":2,"Cat ears":2,"Arrow through head":2,"None":2};let s=base[mon.headAccessory]??2;if(["Curled tail","Arrow tail"].includes(mon.tail))s+=1;if(["Bat wings","Demon wings"].includes(mon.wings))s+=1;if(mon.wings==="Angel wings")s-=1;if(mon.nose==="Long nose")s+=1;if(["Monocle","Moustache + Monocle","Eyepatch","Wayfarer sunglasses"].includes(mon.faceAccessory))s+=1;if(["Gold","Silver"].includes(mon.headMetal)||["Gold teeth","Silver teeth"].includes(mon.teethModifier)||mon.goldMonocle==="Yes")s+=1;if(mon.headAccessory==="Halo")s-=1;if(mon.wings==="Demon wings")s+=1;if(mon.horns==="Curled in")s+=1;if(mon.headAccessory==="Crown"&&mon.headMetal==="Gold")s+=1;if(mon.tail==="Curled tail"&&mon.nose==="Long nose")s+=1;return clampStat(s);}
function computeStats(mon){return {mischief:computeMischief(mon),biteRisk:computeBiteRisk(mon),attentionSpan:computeAttention(mon),charisma:computeCharisma(mon),personalSpace:computePersonalSpace(mon),hoarding:computeHoarding(mon)};}
function createMonster(baseShared,flags){const mon={};mon.twinsFlag=flags&&flags.twins?"Yes":"No";mon.tripletsFlag=flags&&flags.triplets?"Yes":"No";if(baseShared){mon.palette=baseShared.palette;mon.bodyEdge=baseShared.bodyEdge;mon.bodyVariant=baseShared.bodyVariant;mon.facePlacement=baseShared.facePlacement;}else{mon.palette=wPick([["Sunset",10],["Slime",10],["Dream",10],["Mint",10],["Candy",8],["Sorbet",8],["Cotton Candy",8],["Frost",8],["Pastel",8],["Ocean",6],["Sky",6],["Garden",6],["Retro",6],["Vintage",6],["Berry",4],["Fireball",4],["Highlighter",4],["Bruise",4],["Electric",2],["Toxic",2],["Lava",2],["Goth",2]]);mon.bodyEdge=wPick([["Straight edges",12],["Wavy edges",10],["Scalloped edges",7],["Zig zag edges",5]]);mon.bodyVariant=wPick([["Solid",62],["Ombre",26],["Variant B / Speckled",12]]);mon.facePlacement=wPick([["High",8],["Low",3]]);}mon.breed=BREEDS[mon.palette]||"";mon.eyes=wPick([["Normal",15],["Angry",15],["Bored",10],["Shifty",10],["Dots",6],["Sad",6],["1 eye (cyclops)",3],["3 Eyes",1]]);mon.eyeTone=wPick([["Normal",15],["Dark",8],["Light",4]]);mon.brows=reroll(()=>wPick([["Normal straight brow",15],["Normal fluffy brow",14],["Angry straight brow",10],["Worried straight brow",10],["Straight unibrow",8],["Fluffy unibrow",7],["Angry fluffy brow",5],["Worried fluffy brow",5],["None",3],["Just a brow ridge / fold",3]]),b=>!(mon.eyes==="Angry"&&(b==="Worried straight brow"||b==="Worried fluffy brow")));mon.elevenLines=["Angry fluffy brow","Normal fluffy brow","Worried fluffy brow"].includes(mon.brows)?wPick([["No",10],["Yes",1]]):"No";mon.nose=Math.random()<0.5?"Short nose":"Long nose";mon.mouth=wPick([["Normal no lips",14],["Normal lips",14],["Smile no lips",10],["Smile lips",10],["Frown no lips",6],["Frown lips",6],["Surprised",3]]);if(mon.mouth==="Surprised"){mon.teeth="No teeth";mon.teethModifier="None";mon.tongue="No tongue";}else{mon.teeth=wPick([["No teeth",14],["Underbite",12],["Overbite",12],["A single tooth going down",8],["A single tooth going up",8],["Buck teeth",7],["Fangs going down",5],["Fangs going up",5]]);mon.teethModifier=teethModifierFor(mon.teeth);mon.tongue="No tongue";if(Math.random()<0.40){const options=validTonguesForTeeth(mon.teeth);if(options.length)mon.tongue=tongueForTeeth(mon.teeth);}}mon.cheeks=wPick([["Neutral",15],["Eye bags",10],["Puffy cheeks",10],["Freckles",5]]);mon.horns=wPick([["No horns",15],["Small nubs",10],["Straight and pointy",10],["Curled in",6],["Curled out",6],["Antlers",3]]);const activeCount=wPick([[0,52],[1,30],[2,14],[3,4]]);const activeCategories=sampleDistinct(["head","face","tail"],activeCount);mon.tailMode="No tail or wings";mon.tail="None";mon.wings="None";if(activeCategories.includes("tail")){mon.tailMode=wPick([["Tail only",20],["Wings only",8],["Both",2]]);if(mon.tailMode==="Tail only"||mon.tailMode==="Both")mon.tail=wPick([["Round tail",10],["Fluffy tail",10],["Curled tail",10],["Arrow tail",10]]);if(mon.tailMode==="Wings only"||mon.tailMode==="Both")mon.wings=wPick([["Angel wings",6],["Bat wings",6],["Demon wings",6]]);}mon.tailDisplay=mon.tailMode==="No tail or wings"?"No tail or wings":mon.tailMode==="Tail only"?mon.tail:mon.tailMode==="Wings only"?mon.wings:mon.tail+" + "+mon.wings;mon.headAccessory="None";mon.headMetal="None";if(activeCategories.includes("head")){mon.headAccessory=reroll(()=>wPick(headOptionsForHorns(mon.horns).filter(([name])=>name!=="None")),x=>x!=="None");mon.headMetal=headMetalForAccessory(mon.headAccessory);}mon.faceAccessory="None";mon.goldMonocle="No";if(activeCategories.includes("face")){mon.faceAccessory=reroll(()=>wPick(faceAccessoryOptions({facePlacement:mon.facePlacement,tongue:mon.tongue,mouth:mon.mouth}).filter(([name])=>name!=="None")),x=>x!=="None");if((mon.faceAccessory==="Monocle"||mon.faceAccessory==="Moustache + Monocle")&&(mon.faceAccessory==="Moustache + Monocle"||(mon.headAccessory==="Crown"&&mon.headMetal==="Gold"))){mon.goldMonocle=wPick([["No",25],["Yes",1]]);}}mon.stats=computeStats(mon);return mon;}
function mutationDistance(a,b){let changes=0;if(a.eyes!==b.eyes)changes++;if(a.eyeTone!==b.eyeTone)changes++;if(a.brows!==b.brows||a.elevenLines!==b.elevenLines)changes++;if(a.nose!==b.nose)changes++;if(a.mouth!==b.mouth)changes++;if(a.teeth!==b.teeth||a.teethModifier!==b.teethModifier)changes++;if(a.tongue!==b.tongue)changes++;if(a.cheeks!==b.cheeks)changes++;if(a.horns!==b.horns)changes++;if(a.tailDisplay!==b.tailDisplay)changes++;if(a.headAccessory!==b.headAccessory||a.headMetal!==b.headMetal)changes++;if(a.faceAccessory!==b.faceAccessory||a.goldMonocle!==b.goldMonocle)changes++;return changes;}
function mutateMonsterFromBase(base,minChanges,maxChanges,flags){let mon=null;for(let tries=0;tries<500;tries++){mon=createMonster({palette:base.palette,bodyEdge:base.bodyEdge,bodyVariant:base.bodyVariant,facePlacement:base.facePlacement},flags);const changes=mutationDistance(base,mon);if(changes>=minChanges&&changes<=maxChanges)return mon;}return mon;}
function formatStats(stats){return [`Mischief: ${stats.mischief}/5`,`Bite Risk: ${stats.biteRisk}/5`,`Attention Span: ${stats.attentionSpan}/5`,`Charisma: ${stats.charisma}/5`,`Personal Space: ${stats.personalSpace}/5`,`Hoarding: ${stats.hoarding}/5`].join("
");}
function formatMonster(mon,label,family=null,suffix=""){const id=family?`${family}-${suffix}`:stableID(mon);return `${label}
ID: ${id}${family ? "
Family ID: " + family : ""}

Breed: ${mon.breed}
Palette: ${mon.palette}
Body: ${mon.bodyVariant} / ${mon.bodyEdge}
Face Placement: ${mon.facePlacement}

Eyes: ${mon.eyes} (${mon.eyeTone})
Brows: ${mon.brows}${mon.elevenLines==="Yes" ? " + eleven lines" : ""}
Nose: ${mon.nose}
Mouth: ${mon.mouth}

Teeth: ${mon.teeth}${mon.teethModifier!=="None" ? " + " + mon.teethModifier : ""}
Tongue: ${mon.tongue}
Cheeks: ${mon.cheeks}

Horns: ${mon.horns}
Tail / Wings: ${mon.tailDisplay}
Head Accessory: ${mon.headAccessory}${mon.headMetal!=="None" ? " (" + mon.headMetal + ")" : ""}
Face Accessory: ${mon.faceAccessory}${mon.goldMonocle==="Yes" ? " + Gold Monocle" : ""}

Stats
